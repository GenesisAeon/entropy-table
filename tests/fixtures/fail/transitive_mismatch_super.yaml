schema_version: "1.0.0"
id: transitive-mismatch-super
title: Supersystem that forgets the information channel
# Scenario: this supersystem only declares [heat], but its subsystem
# (transitive_mismatch_sub) also uses [information].
# The missing 'information' channel violates the transitive inclusion rule and
# would cause validate_composition.py to emit a hard error:
#   Transitive channel integrity violation: supersystem 'transitive-mismatch-super'
#   does not declare all channels of subsystem 'transitive-mismatch-sub'.
#   Missing: ['information']. Path: transitive-mismatch-sub -> transitive-mismatch-super
system_type:
  primary: stochastic_thermodynamics
  tags:
  - overdamped-langevin
  - markovian
entropy_quantity_kind: production_rate
epistemic_status: numerical
scope:
  applies_to:
  - synthetic benchmark ensemble
  does_not_apply:
  - quantum coherent regimes
boundary:
  closure_type: effectively_closed
  closure_notes: Only heat exchange is modelled at the coarse level — information channel omitted in error.
  exchange_channels:
  - heat
  external_entities:
  - id: thermal-bath
    role: reservoir
    notes: Heat reservoir visible at the macro level
