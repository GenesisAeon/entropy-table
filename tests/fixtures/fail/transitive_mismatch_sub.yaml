    name: low
    spec_type: range
    value:
    - 0.0
    - 1.0
    units: Hz
    notes: placeholder
parameter_bands:
  beta:
    id: pb-beta
    name: beta
    spec_type: range
    value:
    - 0.1
    - 1.0
    units: 1/J
    notes: placeholder
  theta:
    id: pb-theta
    name: theta
    spec_type: point
    value: 0.5
    units: '1'
    notes: placeholder
  zeta:
    id: pb-zeta
    name: zeta
    spec_type: categorical
    value: medium
    units: none
    notes: placeholder
must_fail_tests:
