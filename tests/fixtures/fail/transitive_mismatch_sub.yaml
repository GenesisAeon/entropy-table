schema_version: "1.0.0"
id: transitive-mismatch-sub
title: Subsystem with heat + information channels
# Scenario: this subsystem declares [heat, information].
# Its supersystem (transitive_mismatch_super) only declares [heat].
# That omission violates the transitive channel-inclusion rule:
#   transitive-mismatch-sub -> transitive-mismatch-super
system_type:
  primary: stochastic_thermodynamics
  tags:
  - overdamped-langevin
  - markovian
entropy_quantity_kind: production_rate
epistemic_status: numerical
scope:
  applies_to:
  - synthetic benchmark particle
  does_not_apply:
  - quantum coherent regimes
boundary:
  closure_type: effectively_closed
  closure_notes: Heat and information channels are both active over the selected window.
  exchange_channels:
  - heat
  - information
  external_entities:
  - id: thermal-bath
    role: reservoir
    notes: Heat reservoir
  - id: measurement-device
    role: measurement
    notes: Provides the information channel
entropy_accounting:
  storage_term:
    symbol: S
    latex: S
    units: J/K
    notes: placeholder
  production_term:
    symbol: Sigmadot
    latex: \dot{\Sigma}
    units: J/(K s)
    notes: placeholder
  flux_term:
    symbol: Phidot
    latex: \dot{\Phi}
    units: J/(K s)
    notes: placeholder
  accounting_status: approximate
entropy_definition:
  symbol: S
  latex: S = -k_B \sum_i p_i \ln p_i
  units: J/K
  assumptions:
  - id: a1
    statement: Local equilibrium proxy assumption.
    epistemic_status: heuristic
    citations:
    - c1
  zero_conditions:
  - id: z1
    statement: Entropy production is zero at static equilibrium.
    citations:
    - c1
operators:
  triggers:
  - id: tr1
    name: shear-drive
    definition: synthetic trigger
    params:
    - drive
    observables:
    - velocity
    notes: placeholder
    epistemic_status: numerical
    citations:
    - c1
  dampers:
  - id: da1
    name: viscous-damping
    definition: synthetic damper
    params:
    - gamma
    observables:
    - velocity
    notes: placeholder
    epistemic_status: empirical
    citations:
    - c1
spectral:
  method: stft
  phi_semantics: power
  phi_definition:
    latex: \Phi(f)
    notes: placeholder
  bands:
