id: overdamped-nonisothermal-anomalous-ep
source_domain_id: overdamped-langevin-st
target_domain_id: overdamped-langevin-st
relation_type: regime_shift
conditions:
  text: Transition from uniform-temperature overdamped modeling to spatially varying temperature T(x) and/or friction gamma(x), where the overdamped elimination becomes singular and requires anomalous entropy-production corrections.
  params:
    isothermal_assumption: false
    spatial_temperature_gradient: true
    spatial_friction_gradient: true
    correction_required: true
    multiplicative_noise_convention_required: true
preserved:
  - overdamped state-space representation in position variables
  - positivity of full entropy production once anomalous term is included
lost:
  - exactness of naive isothermal overdamped EP accounting
  - direct equivalence between overdamped EP and underdamped full dissipation
expected_effect:
  direction: decrease
  inequality: sigma_naive_overdamped <= sigma_true_with_anomalous_correction
  description: Naive overdamped formulas systematically miss positive anomalous contributions in nonisothermal inhomogeneous media.
must_fail_tests:
  - id: missing-anomalous-correction
    statement: In a system with T(x) gradients, report sigma_naive_overdamped as the exact total EP without additional terms.
    expected_outcome: reject
    rationale: Celani et al. show an anomalous positive contribution generated by fast-velocity elimination in inhomogeneous thermal fields.
    citations: [celani2012-prl]
    severity: hard
  - id: wrong-sign-anomalous-term
    statement: Fit data from nonisothermal overdamped dynamics with a negative anomalous correction that lowers true EP below the naive value.
    expected_outcome: reject
    rationale: The correction corresponds to extra irreversibility and therefore cannot make true EP smaller than the naive overdamped estimate under the stated regime.
    citations: [celani2012-prl, seifert2012-rpp]
    severity: hard
citations:
  - id: celani2012-prl
    type: doi
    ref: "10.1103/PhysRevLett.109.260603"
    title: Anomalous Thermodynamics at the Microscale
    year: 2012
    authors: [A. Celani, S. Bo, R. Eichhorn, E. Aurell]
  - id: seifert2012-rpp
    type: doi
    ref: "10.1088/0034-4885/75/12/126001"
    title: Stochastic thermodynamics, fluctuation theorems and molecular machines
    year: 2012
    authors: [U. Seifert]
status: review
context:
  tags: [overdamped-langevin, nonisothermal, anomalous-ep, regime-shift]
  notes: Self-map relation encodes a regime shift contract; introduce a dedicated variant domain only when long-lived separate semantics are required.
