id: ctmc-to-diffusion-limit
source_domain_id: ctmc-schnakenberg
target_domain_id: overdamped-langevin-st
relation_type: approximation_limit
conditions:
  text: Use the controlled diffusive lattice limit in which nearest-neighbor CTMC jumps converge to an overdamped Langevin/Fokker-Planck description under local detailed balance in an isothermal bath.
  params:
    dx_limit: 0
    rate_scaling: "w_±(x) = D/dx^2 ± (mu*F(x))/(2*dx) + O(1), with F(x) = -dU/dx"
    local_detailed_balance_ratio: "ln[w_+(x)/w_-(x+dx)] = -beta*(U(x+dx)-U(x)) + O(dx^3)"
    isothermal_bath: "T(x)=const"
    smooth_potential_requirement: "U in C^2 (piecewise C^3 preferred for controlled truncation errors)"
    smooth_density_requirement: "p(x,t), F(x), D(x) sufficiently smooth for Kramers-Moyal truncation"
    local_detailed_balance: true
preserved:
  - positivity of total entropy production
  - path-ratio/KL interpretation of irreversibility and integral fluctuation theorem structure under matched forward-backward conventions
  - detailed-balance equivalence with zero entropy production in the equilibrium/isothermal limit
  - continuity-equation form for probability evolution in the limiting Fokker-Planck dynamics
lost:
  - discrete cycle-topology resolution and edge-resolved affinity-current decomposition
  - finite-state jump-counting/event-statistics at sub-cell resolution
  - hidden-variable and unresolved fast-mode contributions that can change apparent entropy production after coarse-graining
expected_effect:
  direction: context_dependent
  inequality: "sigma_ctmc -> sigma_overdamped as dx -> 0 under the stated scaling/regularity assumptions; at finite dx either estimator may under- or over-shoot depending on discretization and coarse-graining bias."
  description: Convergence is asymptotic in the controlled diffusive/isothermal limit. Away from that limit, finite-resolution errors, cancellation structure in discrete currents, and singular elimination effects can invalidate naive one-to-one EP matching.
must_fail_tests:
  - id: inhomogeneous-temperature-anomaly
    statement: Apply naive overdamped diffusion-limit EP formula to a CTMC approximation with spatially varying temperature/friction and conclude full EP is captured without correction.
    expected_outcome: reject
    rationale: Eliminating fast variables in inhomogeneous media can produce anomalous EP not recovered by naive overdamped formulas.
    citations: [celani2012-prl]
    severity: hard
  - id: spatially-varying-friction-singular-limit
    statement: Use a CTMC with gamma(x) varying across space, take dx -> 0, and claim naive overdamped EP from the reduced position process remains exact without singular-limit correction terms.
    expected_outcome: reject
    rationale: Position-dependent damping/noise in overdamped reductions introduces singular-limit corrections; naive formulas can miss irreversible contributions.
    citations: [celani2012-prl, seifert2012-rpp]
    severity: hard
  - id: multiplicative-noise-convention-ambiguity
    statement: Estimate EP in a diffusion-limit model with state-dependent diffusion using mixed Itô/Stratonovich conventions but claim convention-independent equality to CTMC EP.
    expected_outcome: reject
    rationale: With multiplicative noise, drift/heat bookkeeping depends on a declared stochastic-calculus convention; inconsistent conventions make EP estimates ambiguous.
    citations: [spinney-ford2012-pre, sekimoto2010-book]
    severity: hard
