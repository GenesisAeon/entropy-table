    year: 1976
    authors: [G. Lindblad]
status: draft
context:
  tags: [quantum-lindblad, ctmc, classical-limit, high-temperature, decoherence]
  notes: The classical limit recovers the Pauli master equation from the GKSL diagonal populations; this is the canonical quantum-to-classical correspondence for Markovian open systems.
