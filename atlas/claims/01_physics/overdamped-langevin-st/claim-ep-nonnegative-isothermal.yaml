id: ep-nonnegative-isothermal
title: Isothermal overdamped total entropy production is nonnegative
domain_ref: overdamped-langevin-st
claim_kind: theorem
statement:
  text: Total entropy production is nonnegative for overdamped Markov diffusion under local detailed balance in an isothermal bath.
  latex: "\\sigma(t)=\\int \\frac{J^\\top D^{-1}J}{p}dx \\ge 0"
assumptions:
  - Dynamics is Markovian overdamped diffusion with positive diffusion tensor.
  - Local detailed balance links path asymmetry to heat exchange.
  - Bath temperature is spatially uniform and time-independent.
falsification:
  must_fail_refs:
    - equilibrium-zero-ep
    - nonisothermal-naive-overdamped-closure
  notes: Any accepted counterexample violating these hooks invalidates this claim in its stated scope.
