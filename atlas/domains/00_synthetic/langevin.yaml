domain: synthetic_langevin
system_type: stochastic_differential
scope:
  applies_to: "Noisy mesoscopic trajectories in synthetic benchmark systems"
  does_not_apply: "Deterministic Hamiltonian systems without stochastic forcing"
entropy_proxy:
  symbol: "\\dot{S}_{\\mathrm{prod}}"
  definition_latex: "\\dot{S}_{\\mathrm{prod}} = \\langle F \\circ \\dot{x} / T \\rangle"
  units: "k_B s^{-1}"
  estimation_method: "Pathwise estimator with coarse-grained trajectories"
spectral_bands:
  method: "Welch PSD partition"
  phi_definition_latex: "\\phi_b = \\int_{f_b^-}^{f_b^+} P_{\\dot{S}}(f) \\, df"
  bands: ["beta", "theta", "gamma"]
operators:
  triggers: ["external forcing", "temperature gradient"]
  dampers: ["viscous drag", "feedback control"]
bands:
  beta:
    range: [12.0, 30.0]
  theta:
    range: [4.0, 8.0]
  gamma:
    distribution: "lognormal(mu=3.2,sigma=0.4)"
must_fail_tests:
  - "missing_entropy_proxy_symbol"
  - "empty_operators_triggers"
citations: []
status: draft
