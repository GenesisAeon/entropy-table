id: supersystem-network
title: Synthetic Supersystem Network
system_type:
  primary: markov_network_thermodynamics
  tags: [coarse-network, mesoscale]
entropy_quantity_kind: budget_entropy
epistemic_status: heuristic
scope:
  applies_to: [synthetic coupled subsystems]
  does_not_apply: [single isolated microstate]
boundary:
  closure_type: open
  exchange_channels: [heat, matter, information]
  external_entities:
    - id: thermal-bath
      role: reservoir
      notes: "Shared thermal reservoir coupling network edges. Edge-level heat dissipation: dQ_e = k_B T * ln(w_ij / w_ji) per net transition (local detailed balance)."
    - id: controller
      role: driver
      notes: synthetic controller
    - id: information-bus
      role: measurement
      notes: "Inter-module information channel carrying transfer entropy T(X_k -> X_l). Contributes to network-level information budget in the generalized second law: Sigma_net >= -sum_kl T(X_k->X_l)."
entropy_accounting:
  storage_term: {symbol: Ssys, latex: "S_{sys}", units: "J/K", notes: placeholder}
  production_term: {symbol: Sigmasys, latex: "\\Sigma_{sys}", units: "J/K", notes: placeholder}
  flux_term: {symbol: Phisys, latex: "\\Phi_{sys}", units: "J/K", notes: placeholder}
  decomposition_terms:
    - id: edge-heat-dissipation
      name: Network edge heat dissipation
      latex: "\\dot{Q}_{\\mathrm{net}} = k_B T \\sum_{e} J_e \\ln\\frac{w_{ij}}{w_{ji}}"
      notes: "Total heat dissipated across all network edges per unit time via local detailed balance. Linked to heat exchange_channel."
      epistemic_status: heuristic
    - id: transfer-entropy-term
      name: Inter-module transfer entropy
      latex: "T(X_k \\to X_l) = \\sum_{x_k, x_l} p\\,\\ln\\frac{p(x_l^{t+1}|x_l^t,x_k^t)}{p(x_l^{t+1}|x_l^t)}"
      notes: "Directed information flow between network modules; enters network-level generalized second law correction. Linked to information exchange_channel."
      epistemic_status: heuristic
  accounting_status: proxy
entropy_definition:
  symbol: Ssys
  latex: "S_{sys}=\\sum_k S_k"
  units: "J/K"
  assumptions:
    - id: a1
      statement: Additive approximation across modules.
      epistemic_status: disputed
      citations: [c1]
  zero_conditions:
    - id: z1
      statement: Zero under fully synchronized null process.
      citations: [c1]
operators:
  triggers:
    - id: tr1
      name: coupling-on
      definition: activates module exchange
      params: [kappa]
      observables: [edge-flow]
      notes: placeholder
      epistemic_status: heuristic
      citations: [c1]
  dampers:
    - id: da1
      name: regulation
      definition: suppresses bursts
      params: [eta]
      observables: [edge-flow]
      notes: placeholder
      epistemic_status: empirical
      citations: [c1]
spectral:
  method: wavelet
  phi_semantics: energy
  phi_definition:
    latex: "\\Phi_{sys}(\\omega)"
    notes: placeholder
  bands:
    - id: b-mid
      name: medium
      spec_type: range
      value: [1.0, 5.0]
      units: Hz
      notes: placeholder
parameter_bands:
  beta: {id: pb-beta, name: beta, spec_type: point, value: 1.2, units: "1/J", notes: placeholder}
  theta: {id: pb-theta, name: theta, spec_type: range, value: [0.2, 0.9], units: "1", notes: placeholder}
  zeta: {id: pb-zeta, name: zeta, spec_type: distribution, value: lognormal, units: none, notes: placeholder}
must_fail_tests:
  - id: mf1
    statement: Unnormalized transition matrix should fail budget equation.
    expected_outcome: reject
    rationale: conservation violation
    citations: [c1]
    severity: hard
  - id: mf2
    statement: Empty graph should fail relation extraction.
    expected_outcome: reject
    rationale: no connected structure
    citations: [c1]
    severity: soft
citations:
  - id: c1
    type: note
    ref: synthetic-reference-2
status: review
synthetic: true
