id: quantum-lindblad
title: Quantum Open Systems (GKSL / Lindblad Master Equation)
system_type:
  primary: quantum_open_systems
  tags: [quantum, lindblad, gksl, open-system, markovian]
  notes: Markovian dynamics of open quantum systems described by the Gorini-Kossakowski-Sudarshan-Lindblad (GKSL) master equation.
entropy_quantity_kind: production_rate
epistemic_status: theorem
scope:
  applies_to:
    - Weakly coupled open quantum systems where the Born-Markov approximation holds.
    - Systems with well-separated bath timescales leading to memoryless (Markovian) evolution.
  does_not_apply:
    - Strongly coupled systems requiring non-Markovian memory kernels or hierarchical equations of motion.
    - Purely unitary, isolated quantum systems where entropy production is trivially zero.
boundary:
  closure_type: open
  closure_notes: The system exchanges energy and information with a memoryless macroscopic environment, modeled via dissipative jump operators.
  exchange_channels: [heat, work, information]
  external_entities:
    - id: thermal-bath
      role: reservoir
      notes: A large environmental bath in thermal equilibrium causing decoherence and dissipation.
    - id: coherent-drive
      role: driver
      notes: External time-dependent classical fields driving the system's unitary Hamiltonian evolution.
entropy_accounting:
  storage_term:
    symbol: dSsysdt
    latex: "\\frac{dS_{\\mathrm{sys}}}{dt} = -k_B \\text{Tr}(\\dot{\\rho} \\ln \\rho)"
    units: "k_B/s"
    notes: Time derivative of the von Neumann entropy for the reduced density matrix rho.
  production_term:
    symbol: sigma
    latex: "\\sigma = -k_B \\text{Tr}\\big(\\mathcal{L}(\\rho) (\\ln \\rho - \\ln \\rho_{\\mathrm{eq}})\\big) \\ge 0"
    units: "k_B/s"
    notes: Quantum entropy production rate via Spohn's inequality, assuming relaxation to a thermal equilibrium state rho_eq.
  flux_term:
    symbol: dsmeddt
    latex: "\\dot S_{\\mathrm{med}} = -k_B \\text{Tr}\\big(\\mathcal{L}(\\rho) \\ln \\rho_{\\mathrm{eq}}\\big)"
    units: "k_B/s"
    notes: Entropy flux to the environment, corresponding to heat dissipation for a thermal bath.
  decomposition_terms:
    - id: unitary-entropy-flow
      name: Unitary contribution
      latex: "\\dot{S}_{\\mathrm{unitary}} = 0"
      notes: The Hamiltonian part of the Lindbladian does not change the von Neumann entropy.
      epistemic_status: theorem
  accounting_status: exact
entropy_definition:
  symbol: sigma
  latex: "\\sigma = \\frac{dS_{\\mathrm{sys}}}{dt} + \\dot S_{\\mathrm{med}} \\ge 0"
  units: "k_B/s"
  assumptions:
    - id: born-markov-approximation
      statement: Weak coupling and short bath memory times allow tracing out the bath to yield a local-in-time Lindbladian.
      epistemic_status: theorem
      citations: [breuer-petruccione2002]
    - id: cptp-evolution
      statement: The dynamical map generated by the Lindblad equation is completely positive and trace-preserving (CPTP).
      epistemic_status: theorem
      citations: [lindblad1976]
  zero_conditions:
    - id: thermal-equilibrium-relaxation
      statement: Sigma vanishes identically when the density matrix rho reaches the stationary equilibrium state rho_eq.
      citations: [spohn1978]
operators:
  triggers:
    - id: coherent-driving
      name: coherent-driving
      definition: Modulate the external Hamiltonian to push the system away from its stationary dissipative state.
      params: [drive-amplitude, detuning]
      observables: [entropy-production-rate, steady-state-coherence]
      notes: Driving prevents complete relaxation, generating continuous non-equilibrium entropy production.
      epistemic_status: theorem
      citations: [breuer-petruccione2002]
  dampers:
    - id: dissipative-relaxation
      name: dissipative-relaxation
      definition: Remove coherent driving and allow the system to decay towards thermal equilibrium via jump operators.
      params: [coupling-strength, bath-temperature]
      observables: [entropy-production-rate]
      notes: Entropy production decays to zero as the state approaches the thermal Gibbs state.
      epistemic_status: theorem
      citations: [spohn1978]
spectral:
  method: none
  phi_semantics: none
  phi_definition:
    latex: "\\Phi(f)=\\text{none}"
    notes: Not standardly evaluated in the frequency domain for basic GKSL models.
  bands: []
parameter_bands:
  beta:
    id: inverse-bath-temperature
    name: inverse bath temperature
    spec_type: range
    value: [0.001, 100.0]
    units: "1/(k_B T)"
    notes: Governs the ratio of excitation to decay jump rates via local detailed balance.
  theta:
    id: drive-dissipation-ratio
    name: drive-to-dissipation ratio
    spec_type: range
    value: [0.0, 10.0]
    units: "1"
    notes: Ratio of Hamiltonian coherent drive strength to Lindblad decay rates.
  zeta:
    id: bath-memory-timescale
    name: bath memory correlation time
    spec_type: range
    value: [0.0, 0.1]
    units: "s"
    notes: Must remain close to zero for the Markovian GKSL approximation to be valid.
must_fail_tests:
  - id: non-cptp-rates
    statement: Define a Lindblad master equation with negative decay rates leading to a loss of complete positivity.
    expected_outcome: reject
    rationale: The GKSL theorem requires strictly non-negative decay rates for physical CPTP maps; negative rates yield unphysical negative probabilities.
    citations: [lindblad1976, gorini1976]
    severity: hard
  - id: spohn-inequality-violation
    statement: Compute a negative entropy production rate during relaxation to a unique thermal equilibrium state.
    expected_outcome: reject
    rationale: Spohn's inequality guarantees non-negative entropy production for Markovian thermal relaxation.
    citations: [spohn1978]
    severity: hard
limitations:
  - id: strong-coupling-breakdown
    statement: The GKSL form is inadequate for strongly coupled systems where system-bath entanglement is non-negligible, requiring exact non-Markovian methods.
    citations: [breuer-petruccione2002]
citations:
  - id: lindblad1976
    type: doi
    ref: "10.1007/BF01608499"
    title: On the generators of quantum dynamical semigroups
    year: 1976
    authors: [G. Lindblad]
  - id: gorini1976
    type: doi
    ref: "10.1063/1.522979"
    title: Completely positive dynamical semigroups of N-level systems
    year: 1976
    authors: [V. Gorini, A. Kossakowski, E. C. G. Sudarshan]
  - id: spohn1978
    type: doi
    ref: "10.1063/1.523789"
    title: Entropy production for quantum dynamical semigroups
    year: 1978
    authors: [H. Spohn]
  - id: breuer-petruccione2002
    type: book
    ref: "Oxford University Press"
    title: The Theory of Open Quantum Systems
    year: 2002
    authors: [H.-P. Breuer, F. Petruccione]
status: draft
