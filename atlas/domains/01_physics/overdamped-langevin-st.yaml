id: overdamped-langevin-st
title: Overdamped Langevin — Stochastic Thermodynamics
system_type:
  primary: stochastic_thermodynamics
  tags: [overdamped-langevin, markovian, diffusion, thermal-bath, seifert]
  notes: Mesoscopic diffusion dynamics with entropy production defined via path-probability irreversibility.
entropy_quantity_kind: production_rate
epistemic_status: theorem
scope:
  applies_to:
    - Overdamped Itô or Stratonovich Langevin dynamics in contact with an isothermal thermal reservoir.
    - Fokker-Planck descriptions with smooth probability density p(x,t), drift, and positive diffusion tensor.
    - Stochastic thermodynamic analyses of trajectory-level and ensemble-level entropy production.
  does_not_apply:
    - Underdamped regimes where momentum degrees of freedom are explicitly thermodynamic state variables.
    - Strongly non-Markovian baths with memory kernels not representable by effective white noise.
    - Nonisothermal media with strong spatial temperature/friction gradients without anomalous EP corrections.
boundary:
  closure_type: effectively_closed
  closure_notes: Microscopic bath degrees of freedom are coarse-grained into friction and noise terms; energetic exchanges are represented through explicit work and heat terms in the stochastic energetics.
  exchange_channels: [heat, work, information]
  external_entities:
    - id: thermal-bath
      role: reservoir
      notes: Isothermal reservoir enforces fluctuation-dissipation relation D = mu k_B T in the baseline model.
    - id: external-protocol
      role: driver
      notes: Time-dependent control parameters inject work and induce nonequilibrium driving.
    - id: measurement-apparatus
      role: measurement
      notes: Optional feedback/measurement channel contributes information-theoretic terms in generalized second-law balances.
entropy_accounting:
  storage_term:
    symbol: dSsysdt
    latex: "\\frac{dS_{\\mathrm{sys}}}{dt} = -\\int \\partial_t p(x,t) \\ln p(x,t)\\,dx"
    units: "k_B/s"
    notes: Shannon entropy rate of the system distribution under Fokker-Planck evolution.
  production_term:
    symbol: sigma
    latex: "\\sigma = \\int \\frac{J(x,t)^\\top D^{-1}(x,t) J(x,t)}{p(x,t)}\\,dx \\ge 0"
    units: "k_B/s"
    notes: Ensemble total entropy production rate, equivalent to average trajectory irreversibility under local detailed balance.
  flux_term:
    symbol: dsenvdt
    latex: "\\dot S_{\\mathrm{env}} = \\frac{\\dot Q}{T}"
    units: "k_B/s"
    notes: Environment entropy flow identified with stochastic heat dissipation over bath temperature for the isothermal case.
  decomposition_terms:
    - id: trajectory-total-ep
      name: Trajectory total entropy production
      latex: "\\Delta s_{\\mathrm{tot}}[x(\\cdot)] = \\ln \\frac{\\mathcal{P}[x(\\cdot)]}{\\mathcal{P}^{\\dagger}[x^{\\dagger}(\\cdot)]}"
      notes: Pathwise irreversibility formula with forward/backward path measures; exact under Markov diffusion assumptions.
      epistemic_status: theorem
    - id: housekeeping-excess-split
      name: Housekeeping versus excess components
      latex: "\\Delta s_{\\mathrm{tot}} = \\Delta s_{\\mathrm{hk}} + \\Delta s_{\\mathrm{ex}}"
      notes: Split is useful in driven steady states but becomes convention-sensitive under odd variables or coarse modeling choices.
      epistemic_status: heuristic
  accounting_status: exact
entropy_definition:
  symbol: sigma
  latex: "d x_t = \\mu F(x_t,t)dt + \\sqrt{2D}\\,dW_t,\\; D=\\mu k_B T;\\quad \\Delta s_{\\mathrm{tot}}=\\ln\\frac{\\mathcal{P}[x(\\cdot)]}{\\mathcal{P}^{\\dagger}[x^{\\dagger}(\\cdot)]},\\;\\; \\sigma(t)=\\int \\frac{J^\\top D^{-1}J}{p}dx."
  units: "k_B/s"
  assumptions:
    - id: markov-diffusion-assumption
      statement: Dynamics is a Markov diffusion process generated by an overdamped Langevin SDE with well-defined drift and diffusion.
      epistemic_status: theorem
      citations: [seifert2012, lebowitzspohn1999]
    - id: stochastic-calculus-convention
      statement: A fixed stochastic calculus convention (Itô or Stratonovich) is used consistently when converting between SDE and Fokker-Planck forms.
      epistemic_status: theorem
      citations: [sekimoto2010, spinneyford2012]
    - id: local-detailed-balance
      statement: Local detailed balance links path-probability asymmetry to exchanged heat in an isothermal bath.
      epistemic_status: theorem
      citations: [seifert2012, crooks1999]
    - id: isothermal-bath-assumption
      statement: Bath temperature is spatially uniform and time-independent in the baseline overdamped EP formula.
      epistemic_status: theorem
      citations: [seifert2012, celani2012]
  zero_conditions:
    - id: detailed-balance-equilibrium
      statement: At equilibrium with detailed balance and vanishing irreversible probability current, sigma equals zero.
      citations: [seifert2012, lebowitzspohn1999]
    - id: quasistatic-reversible-limit
      statement: In reversible quasistatic protocols connecting equilibrium states, average total EP tends to zero.
      citations: [jarzynski1997, crooks1999]
operators:
  triggers:
    - id: nonconservative-force-driving
      name: nonconservative-force-driving
      definition: Apply non-gradient forcing so stationary probability currents circulate and detailed balance is broken.
      params: [force-nongradient-component, affinity-scale]
      observables: [probability-current, entropy-production-rate]
      notes: Sustained nonequilibrium currents produce positive housekeeping EP.
      epistemic_status: theorem
      citations: [seifert2012]
    - id: protocol-time-modulation
      name: protocol-time-modulation
      definition: Drive control parameters explicitly in time (lambda(t)) to generate excess dissipation and fluctuation-theorem work statistics.
      params: [protocol-rate, protocol-amplitude]
      observables: [work-distribution, entropy-production-rate]
      notes: Finite-rate driving generally increases EP relative to quasistatic operation.
      epistemic_status: theorem
      citations: [jarzynski1997, crooks1999]
  dampers:
    - id: conservative-fdt-restoration
      name: conservative-fdt-restoration
      definition: Enforce gradient drift F = -nabla U with Einstein relation so detailed balance is restored.
      params: [potential-convexity, temperature, mobility]
      observables: [irreversible-current, entropy-production-rate]
      notes: Conservative forcing with fluctuation-dissipation consistency relaxes toward equilibrium and suppresses EP.
      epistemic_status: theorem
      citations: [seifert2012, sekimoto2010]
    - id: enhanced-diffusive-smoothing
      name: enhanced-diffusive-smoothing
      definition: Increase effective diffusion or friction to smooth probability gradients and attenuate current magnitudes under fixed forcing scales.
      params: [diffusion-scale, friction-scale]
      observables: [current-norm, entropy-production-rate]
      notes: Current suppression trend is model-dependent away from near-equilibrium scaling and is treated heuristically.
      epistemic_status: heuristic
      citations: [gardiner2009]
spectral:
  method: none
  phi_semantics: none
  phi_definition:
    latex: "\\Phi(f)=\\text{none}"
    notes: No frequency-domain entropy observable is canonical in this domain specification.
  bands:
    - id: none
      name: none
      spec_type: none
      value: null
      units: "1"
      notes: Placeholder band to satisfy schema while spectral decomposition is intentionally disabled.
parameter_bands:
  beta:
    id: inverse-temperature-band
    name: inverse-temperature regime
    spec_type: categorical
    value: [isothermal-baseline, weakly-perturbed]
    units: "1/(k_B T)"
    notes: Tracks applicability of isothermal assumptions; extend to field beta(x) in nonisothermal variants.
  theta:
    id: driving-timescale-band
    name: protocol timescale regime
    spec_type: categorical
    value: [quasistatic, finite-rate, rapid]
    units: "s"
    notes: Descriptive protocol-rate classes for future quantitative calibration.
  zeta:
    id: damping-diffusion-band
    name: damping and diffusivity structure
    spec_type: categorical
    value: [uniform-friction, weakly-inhomogeneous, strong-inhomogeneous]
    units: "arb"
    notes: Reserved for extensions where friction and diffusion fields vary across configuration space.
must_fail_tests:
  - id: equilibrium-zero-ep
    statement: Claim positive sigma in a steady state satisfying detailed balance with J(x)=0 everywhere.
    expected_outcome: reject
    rationale: Detailed balance with zero irreversible current implies vanishing total entropy production.
    citations: [seifert2012, lebowitzspohn1999]
    severity: hard
  - id: nonisothermal-naive-overdamped-closure
    statement: Apply isothermal overdamped EP formula without correction to systems with spatially varying temperature T(x) or friction gamma(x) and claim exact total EP.
    expected_outcome: reject
    rationale: Singular overdamped elimination in inhomogeneous thermal environments yields anomalous EP terms beyond naive overdamped accounting.
    citations: [celani2012]
    severity: hard
limitations:
  - id: nonuniform-temperature-anomaly
    statement: For T(x) varying in space, naive overdamped entropy production underestimates full underdamped dissipation due to anomalous contributions.
    citations: [celani2012]
  - id: multiplicative-noise-convention
    statement: Position-dependent mobility/friction introduces multiplicative noise where Itô-Stratonovich convention choices affect drift and heat bookkeeping.
    citations: [spinneyford2012, sekimoto2010]
