id: ctmc-seifert
title: Continuous-Time Markov Chain (Seifert)
system_type:
  primary: markov_network_thermodynamics
  tags: [ctmc, stochastic-thermodynamics]
  notes: Finite-state continuous-time jump dynamics with local detailed balance.
entropy_quantity_kind: production_rate
epistemic_status: theorem
scope:
  applies_to:
    - Continuous-time Markov jump processes on discrete states.
  does_not_apply:
    - Deterministic Hamiltonian systems without stochastic coarse-graining.
boundary:
  closure_type: effectively_closed
  closure_notes: Reservoir effects are encoded through transition-rate asymmetries.
  exchange_channels: [heat, matter, chemical]
  external_entities:
    - id: thermal-reservoir
      role: reservoir
      notes: Provides entropy flow through local detailed-balance constraints.
entropy_accounting:
  storage_term:
    symbol: dSsysdt
    latex: "\\frac{dS_{\\mathrm{sys}}}{dt}"
    units: "k_B/s"
    notes: Time derivative of system Shannon entropy.
  production_term:
    symbol: sigma
    latex: "\\sigma"
    units: "k_B/s"
    notes: Total irreversible entropy production rate.
  flux_term:
    symbol: dSmeddt
    latex: "\\dot S_{\\mathrm{med}}"
    units: "k_B/s"
    notes: Entropy flow into the surrounding medium.
  accounting_status: exact
entropy_definition:
  symbol: sigma
  latex: "\\sigma = \\dot S_{\\mathrm{sys}} + \\dot S_{\\mathrm{med}} \\ge 0"
  units: "k_B/s"
  assumptions:
    - id: markovian-dynamics
      statement: Future evolution depends only on the present state.
      epistemic_status: theorem
      citations: [seifert2012-rpp]
    - id: local-detailed-balance
      statement: Forward/backward rate ratios are fixed by environmental entropy change.
      epistemic_status: theorem
      citations: [seifert2012-rpp]
  zero_conditions:
    - id: detailed-balance-zero-ep
      statement: Entropy production vanishes when detailed balance holds.
      citations: [seifert2012-rpp]
operators:
  triggers:
    - id: increase-affinity
      name: increase-affinity
      definition: Increase thermodynamic driving affinities across transitions.
      params: [affinity]
      observables: [entropy-production-rate]
      notes: Stronger driving typically increases irreversible entropy production.
      epistemic_status: theorem
      citations: [seifert2012-rpp]
  dampers:
    - id: restore-detailed-balance
      name: restore-detailed-balance
      definition: Tune rates toward detailed balance.
      params: [rate-ratio-control]
      observables: [entropy-production-rate]
      notes: Entropy production approaches zero as detailed balance is restored.
      epistemic_status: theorem
      citations: [seifert2012-rpp]
spectral:
  method: none
  phi_semantics: none
  phi_definition:
    latex: "\\varphi = \\varnothing"
    notes: No spectral decomposition required for this domain definition.
  bands: []
parameter_bands:
  beta:
    id: beta-ep-rate
    name: entropy-production-rate-scale
    spec_type: range
    value: [0.0, 10.0]
    units: "k_B/s"
    notes: Representative operating band for entropy production rate.
  theta:
    id: theta-driving
    name: driving-strength
    spec_type: range
    value: [0.0, 1.0]
    units: "1"
    notes: Normalized nonequilibrium driving amplitude.
  zeta:
    id: zeta-coarse-graining
    name: coarse-graining-level
    spec_type: range
    value: [0.0, 1.0]
    units: "1"
    notes: 0 for full-state resolution, 1 for maximal lumping.
must_fail_tests:
  - id: negative-ep-under-ldb
    statement: A valid local-detailed-balance CTMC exhibits persistent negative total entropy production.
    expected_outcome: reject
    rationale: Violates non-negativity theorem for total entropy production.
    citations: [seifert2012-rpp]
    severity: hard
  - id: detailed-balance-positive-ep
    statement: A detailed-balance steady state yields strictly positive entropy production.
    expected_outcome: reject
    rationale: Detailed balance implies vanishing irreversible currents.
    citations: [seifert2012-rpp]
    severity: hard
citations:
  - id: seifert2012-rpp
    type: doi
    ref: 10.1088/0034-4885/75/12/126001
    title: Stochastic thermodynamics, fluctuation theorems and molecular machines
    year: 2012
    authors: [U. Seifert]
status: draft
