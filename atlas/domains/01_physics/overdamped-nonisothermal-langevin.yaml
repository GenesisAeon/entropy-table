id: overdamped-nonisothermal-langevin
title: Overdamped Nonisothermal Langevin
system_type:
  primary: stochastic_thermodynamics
  tags: [overdamped-langevin, nonisothermal, anomalous-ep, diffusion, markovian]
  notes: Overdamped diffusion dynamics in inhomogeneous media with spatially varying temperature and friction, requiring anomalous entropy production corrections.
entropy_quantity_kind: production_rate
epistemic_status: theorem
scope:
  applies_to:
    - Overdamped Langevin dynamics with spatially dependent temperature T(x) and friction gamma(x).
    - Systems where singular limit elimination of fast velocity variables generates anomalous heat/entropy terms.
  does_not_apply:
    - Strictly isothermal systems where standard overdamped EP formulas are exact.
    - Full underdamped phase-space models where momentum is explicitly resolved.
boundary:
  closure_type: effectively_closed
  closure_notes: Heat flows are driven by interaction with an inhomogeneous local thermal environment; fast momentum degrees of freedom are coarse-grained.
  exchange_channels: [heat, work, information]
  external_entities:
    - id: inhomogeneous-thermal-bath
      role: reservoir
      notes: Spatially varying thermal environment providing local temperature T(x) and inducing multiplicative noise.
entropy_accounting:
  storage_term:
    symbol: dSsysdt
    latex: "\\frac{dS_{\\mathrm{sys}}}{dt} = -\\int \\partial_t p(x,t) \\ln p(x,t)\\,dx"
    units: "k_B/s"
    notes: System Shannon entropy rate.
  production_term:
    symbol: sigma_tot
    latex: "\\sigma_{\\mathrm{tot}} = \\sigma_{\\mathrm{naive}} + \\sigma_{\\mathrm{anom}} \\ge 0"
    units: "k_B/s"
    notes: Total entropy production includes both the naive overdamped estimate and the anomalous correction; both terms are non-negative and the anomalous term is strictly positive when T(x) gradients are present.
  flux_term:
    symbol: dsenvdt
    latex: "\\dot S_{\\mathrm{env}} = \\int \\frac{dQ(x)}{T(x)}"
    units: "k_B/s"
    notes: Entropy flow accounting for local heat dissipation at position-dependent temperature T(x).
  decomposition_terms:
    - id: naive-overdamped-ep
      name: Naive overdamped EP
      latex: "\\sigma_{\\mathrm{naive}}"
      notes: Standard calculation of EP using trajectory path probabilities without considering the fast velocity elimination limit; underestimates true dissipation in inhomogeneous media.
      epistemic_status: theorem
    - id: anomalous-ep-correction
      name: Anomalous EP correction
      latex: "\\sigma_{\\mathrm{anom}} \\ge 0"
      notes: Strictly non-negative correction term arising from the singular limit of inhomogeneous temperature/friction; vanishes exactly in the isothermal homogeneous case.
      epistemic_status: theorem
  accounting_status: exact
entropy_definition:
  symbol: sigma_tot
  latex: "\\sigma_{\\mathrm{tot}} = \\sigma_{\\mathrm{naive}} + \\sigma_{\\mathrm{anom}},\\quad \\sigma_{\\mathrm{anom}}\\ge 0,\\quad \\sigma_{\\mathrm{naive}} \\le \\sigma_{\\mathrm{tot}}"
  units: "k_B/s"
  assumptions:
    - id: singular-limit-elimination
      statement: The overdamped regime is derived as a singular limit of the underdamped dynamics with position-dependent heat baths; this generates extra irreversibility invisible to naive overdamped accounting.
      epistemic_status: theorem
      citations: [celani2012-prl]
    - id: multiplicative-noise-convention
      statement: A consistent stochastic calculus (Itô/Stratonovich/Klimontovich) must be chosen due to state-dependent diffusion D(x); different conventions shift terms between drift and diffusion but leave the total EP invariant.
      epistemic_status: theorem
      citations: [seifert2012-rpp]
  zero_conditions:
    - id: uniform-equilibrium
      statement: Global detailed balance with uniform temperature restores zero total entropy production; both naive and anomalous terms vanish independently.
      citations: [seifert2012-rpp]
operators:
  triggers:
    - id: increase-temperature-gradient
      name: increase-temperature-gradient
      definition: Steepen the spatial profile of T(x), increasing the magnitude of thermal gradients across the system.
      params: [gradient-scale]
      observables: [anomalous-ep-rate]
      notes: Larger thermal gradients strictly increase the anomalous contribution to the total entropy production.
      epistemic_status: theorem
      citations: [celani2012-prl]
  dampers:
    - id: isothermal-relaxation
      name: isothermal-relaxation
      definition: Flatten T(x) toward a spatially constant temperature, removing the source of the anomalous correction.
      params: [temperature-variance]
      observables: [anomalous-ep-rate]
      notes: As the system approaches an isothermal state the anomalous correction vanishes and the standard overdamped EP formula is recovered.
      epistemic_status: theorem
      citations: [celani2012-prl]
spectral:
  method: none
  phi_semantics: none
  phi_definition:
    latex: "\\Phi(f)=\\text{none}"
    notes: Not evaluated in frequency domain; no canonical spectral entropy observable for this domain.
  bands:
    - id: none
      name: none
      spec_type: none
      value: null
      units: "1"
      notes: Placeholder band to satisfy schema while spectral decomposition is intentionally disabled.
parameter_bands:
  beta:
    id: inverse-temperature-field
    name: inverse-temperature field
    spec_type: categorical
    value: [inhomogeneous]
    units: "1/(k_B T)"
    notes: Beta is a spatially varying field beta(x); the isothermal limit corresponds to a spatially constant beta.
  theta:
    id: thermal-gradient-strength
    name: thermal gradient strength
    spec_type: categorical
    value: [weak, strong]
    units: "K/m"
    notes: Determines the magnitude of the anomalous EP term; vanishes in the isothermal limit.
  zeta:
    id: multiplicative-noise-strength
    name: multiplicative noise strength
    spec_type: categorical
    value: [state-dependent-diffusion]
    units: "arb"
    notes: Encodes the state-dependency of the diffusion tensor D(x) arising from spatially inhomogeneous temperature and friction.
must_fail_tests:
  - id: omit-anomalous-correction
    statement: In a system with T(x) gradients, report sigma_naive_overdamped as the exact total EP without additional terms.
    expected_outcome: reject
    rationale: Missing the strictly positive anomalous contribution generated by fast-velocity elimination in inhomogeneous thermal fields; naive formula is a strict lower bound, not the exact value.
    citations: [celani2012-prl]
    severity: hard
  - id: wrong-sign-anomalous-term
    statement: Fit data from nonisothermal overdamped dynamics with a negative anomalous correction that lowers true EP below the naive value.
    expected_outcome: reject
    rationale: The anomalous correction corresponds to extra irreversibility from the singular overdamped limit and is therefore non-negative; it cannot make the true EP smaller than the naive overdamped estimate.
    citations: [celani2012-prl, seifert2012-rpp]
    severity: hard
limitations:
  - id: timescale-separation-breakdown
    statement: Even with the anomalous correction, extremely steep gradients may break the timescale separation required for the overdamped limit entirely, rendering the corrected formula invalid.
    citations: [celani2012-prl]
citations:
  - id: celani2012-prl
    type: doi
    ref: "10.1103/PhysRevLett.109.260603"
    title: Anomalous Thermodynamics at the Microscale
    year: 2012
    authors: [A. Celani, S. Bo, R. Eichhorn, E. Aurell]
  - id: seifert2012-rpp
    type: doi
    ref: "10.1088/0034-4885/75/12/126001"
    title: Stochastic thermodynamics, fluctuation theorems and molecular machines
    year: 2012
    authors: [U. Seifert]
status: draft
