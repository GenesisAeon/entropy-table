name: ci

on:
  push:
  pull_request:

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Offizielle uv Action einbinden (mit extrem schnellem Caching)
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # Python-Version festlegen
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Synchronisiert die exakten Versionen aus der uv.lock in ein .venv
      - name: Install dependencies
        run: uv sync

      # Fügt das virtuelle uv-Environment dem Runner-Pfad hinzu
      # (Dadurch funktionieren alle nachfolgenden 'make'-Befehle unverändert!)
      - name: Activate venv
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Cache DOI validations
        uses: actions/cache@v4
        with:
          path: cache/valid_dois.json
          key: doi-cache-${{ hashFiles('atlas/bibliography/refs.yaml') }}
          restore-keys: |
            doi-cache-

      - name: Run all tests (via Makefile)
        run: make test

      - name: Validate complete Atlas (via Makefile)
        run: make validate-all

      - name: Analyze atlas health (strict CI mode)
        run: python tools/analyze_health.py --ci-check

      - name: Generate Atlas Graph
        run: make visualize

      - name: Upload Graph Artifact
        uses: actions/upload-artifact@v4
        with:
          name: atlas-graph-mermaid
          path: docs/atlas_graph.mmd
          retention-days: 14
