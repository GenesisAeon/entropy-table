name: ci

on:
  push:
  pull_request:

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Run tests
        run: pytest
      - name: Validate atlas
        run: python tools/validate.py
      - name: Validate bibliography
        run: python tools/validate_bibliography.py
      - name: Analyze atlas health
        run: python tools/analyze_health.py --ci-check
